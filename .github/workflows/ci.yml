name: CI

on:
  push:
  pull_request:

jobs:
  migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run migration reproducibility checks
        run: |
          docker compose --env-file env.example up -d postgres redis
          docker compose --env-file env.example run --rm api alembic -c alembic.ini upgrade head
          docker compose --env-file env.example run --rm api alembic -c alembic.ini upgrade head
          docker compose --env-file env.example run --rm api alembic -c alembic.ini downgrade 0008
          docker compose --env-file env.example run --rm api alembic -c alembic.ini upgrade head
          docker compose --env-file env.example run --rm api python scripts/check_migrations.py
          docker compose --env-file env.example down -v

  web_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm --filter @planner/web typecheck

      - name: Build
        run: pnpm --filter @planner/web build

  api_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API deps
        run: pip install -r apps/api/requirements.txt

      - name: Check web/API contract drift
        run: python scripts/check_web_api_contracts.py

      - name: Run API tests
        run: pytest -q
        working-directory: apps/api

      - name: Run release-critical API reliability suite
        run: pytest -q tests/test_jobs.py tests/test_indexing_pipeline.py tests/test_telemetry.py tests/test_resources.py tests/test_startup_config.py
        working-directory: apps/api

  api_tests_postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API tests against Postgres
        run: |
          docker compose --env-file env.example up -d postgres redis
          docker compose --env-file env.example run --rm \
            -e TEST_DATABASE_URL=postgresql+psycopg://planner:planner@postgres:5432/planner \
            api pytest -q tests/test_auth_bearer.py tests/test_ownership.py tests/test_migrations_schema.py
          docker compose --env-file env.example down -v

  worker_smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/requirements.txt

      - name: Install worker deps
        run: pip install -r apps/worker/requirements.txt

      - name: Worker import smoke
        run: |
          PYTHONPATH=apps/worker:apps/api python -c "import worker.main; print('worker import ok')"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build and start stack
        run: docker compose --env-file env.example up --build -d

      - name: Run migrations + seed
        run: |
          docker compose --env-file env.example exec -T api alembic -c alembic.ini upgrade head
          docker compose --env-file env.example exec -T api python -m app.cli.seed

      - name: Install Playwright browser
        run: pnpm --filter @planner/web exec playwright install --with-deps chromium

      - name: Run web e2e
        run: pnpm --filter @planner/web test:e2e

      - name: Run release-critical web e2e specs
        run: pnpm --filter @planner/web test:e2e e2e/full-flow.spec.ts e2e/upload-search.spec.ts e2e/a11y.spec.ts

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose --env-file env.example logs --tail=200

      - name: Stop stack
        if: always()
        run: docker compose --env-file env.example down -v
